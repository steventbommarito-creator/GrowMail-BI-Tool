name: Osprey Deal Sync

# Scrapes the Gordon & Lance (Osprey) finance report fresh, then syncs those
# orders into Freshworks deals: new order_id -> new deal, changed status/amount
# -> update, INCOMPLETE -> skipped. Self-contained (scrape then sync) so each
# run reads fresh data without depending on the BI Scraper's timing. USPS is not
# touched here — it stays on the BI Scraper's own schedule.
#
# Schedule (GitHub cron is UTC, no daylight-saving): hourly 7a–6p EST plus 9p &
# 11p EST, using EST = UTC-5. In summer (EDT) these fire 1 hour later by the clock.

on:
  schedule:
    - cron: '0 2,4,12-23 * * *'   # 7a–6p EST (UTC 12–23) + 9p EST (UTC 2) + 11p EST (UTC 4)
  workflow_dispatch:

concurrency:
  group: osprey-deal-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
        timeout-minutes: 10
      - name: Scrape Osprey finance report -> osprey_mail_drops
        run: node run.js
        env:
          SCRAPE_SOURCE: osprey
          OSPREY_URL: ${{ secrets.OSPREY_URL }}
          OSPREY_USER: ${{ secrets.OSPREY_USER }}
          OSPREY_PASS: ${{ secrets.OSPREY_PASS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRIGGERED_BY: osprey-deal-sync
      - name: Sync orders -> Freshworks deals
        run: node crm-import/osprey-deal-sync.js
        env:
          CI: 'true'
          FRESHSALES_DOMAIN: ${{ secrets.FRESHSALES_DOMAIN }}
          FRESHSALES_API_KEY: ${{ secrets.FRESHSALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
