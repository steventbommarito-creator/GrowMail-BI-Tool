name: Osprey Deal Sync

# Syncs the Gordon & Lance (Osprey) orders into Freshworks deals: new order_id ->
# new deal, changed status/amount -> update, INCOMPLETE -> skipped. Runs ~30 min
# after each scrape so it reads fresh osprey_mail_drops. Resumable via the
# osprey_deal_sync state table, so the long first seeding can span runs.

on:
  schedule:
    - cron: '30 5,15,17,19,21 * * *'   # ~30 min after each BI Scraper run
  workflow_dispatch:

concurrency:
  group: osprey-deal-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node crm-import/osprey-deal-sync.js
        env:
          CI: 'true'
          FRESHSALES_DOMAIN: ${{ secrets.FRESHSALES_DOMAIN }}
          FRESHSALES_API_KEY: ${{ secrets.FRESHSALES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
